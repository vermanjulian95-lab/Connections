<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>RJ CONNECTIONS PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background-color: #010002; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; color: white; transition: background 0.3s; }
        body.link-mode { background-color: #050010; }
        canvas { position: absolute; top: 0; left: 0; z-index: 2; }
        #watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'Great Vibes', cursive; font-size: 40vw; color: rgba(255, 255, 255, 0.03); user-select: none; z-index: 0; }
        
        #start-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.98); display: flex; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(15px); }
        .start-box { background: #0a0a0c; border: 1px solid #333; padding: 35px; border-radius: 24px; text-align: center; width: 85%; max-width: 380px; }
        
        /* --- 360-GRADEN LUXURY GLINT EFFECT --- */
        .glint-container {
            position: relative;
            display: inline-block;
            margin-bottom: 25px;
        }

        .glint-text {
            font-size: 26px;
            letter-spacing: 4px;
            font-weight: bold;
            margin: 0;
            text-transform: uppercase;
            /* De spotlight die ronddraait */
            background: radial-gradient(
                circle, 
                #ffffff 0%, 
                rgba(255, 255, 255, 0.8) 15%, 
                rgba(255, 255, 255, 0.2) 40%, 
                rgba(255, 255, 255, 0.1) 100%
            );
            background-size: 250% 250%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            /* 6 seconden voor een rustige, vloeiende 360-graden rotatie */
            animation: flashlight 6s infinite linear;
        }

        /* Het fysieke sterretje dat meereist met de spotlight */
        .premium-star {
            position: absolute;
            width: 4px; 
            height: 4px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px 4px rgba(255,255,255,0.8), 0 0 20px 8px rgba(255, 255, 255, 0.3);
            pointer-events: none;
            z-index: 5;
            animation: star-path 6s infinite linear;
        }

        /* Horizontale lichtstraal van de ster */
        .premium-star::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 60px; height: 1px;
            background: radial-gradient(circle, #fff 0%, transparent 100%);
            transform: translate(-50%, -50%);
        }

        /* Verticale lichtstraal van de ster */
        .premium-star::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 1px; height: 60px;
            background: radial-gradient(circle, #fff 0%, transparent 100%);
            transform: translate(-50%, -50%);
        }

        /* De spotlight cirkelt over de achtergrond van de tekst */
        @keyframes flashlight {
            0%   { background-position: 0% 50%; }   /* Links */
            25%  { background-position: 50% 0%; }   /* Boven */
            50%  { background-position: 100% 50%; } /* Rechts */
            75%  { background-position: 50% 100%; } /* Onder */
            100% { background-position: 0% 50%; }   /* Terug naar Links */
        }

        /* De ster reist een fysieke cirkel rond de tekst en groeit/krimpt */
        @keyframes star-path {
            0%   { top: 50%; left: -5%; transform: translate(-50%, -50%) scale(0.3) rotate(0deg); opacity: 0.2; }
            25%  { top: -15%; left: 50%; transform: translate(-50%, -50%) scale(1.3) rotate(45deg); opacity: 1; } /* Felst aan de bovenkant */
            50%  { top: 50%; left: 105%; transform: translate(-50%, -50%) scale(0.3) rotate(90deg); opacity: 0.2; }
            75%  { top: 115%; left: 50%; transform: translate(-50%, -50%) scale(1) rotate(135deg); opacity: 0.8; } /* Fel aan de onderkant */
            100% { top: 50%; left: -5%; transform: translate(-50%, -50%) scale(0.3) rotate(180deg); opacity: 0.2; }
        }
        /* -------------------------------------- */
        
        #ui-panel { position: absolute; top: 40px; left: 15px; width: 250px; background: rgba(8, 8, 10, 0.98); border: 1px solid #444; border-radius: 14px; z-index: 10; display: none; backdrop-filter: blur(20px); }
        .header { padding: 14px; cursor: pointer; font-weight: bold; border-bottom: 1px solid #222; font-size: 11px; letter-spacing: 2.5px; color: #eee; text-transform: uppercase; }
        .content { padding: 16px; max-height: 80vh; overflow-y: auto; }
        #ui-panel.minimized .content { display: none; }

        input, select, button { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; font-size: 14px; box-sizing: border-box; outline: none; }
        .btn-add { background: #2a004d; color: #e0bfff; border: 1px solid #5a00a1; font-weight: bold; cursor: pointer; }
        .btn-link { background: #111; color: #00e5ff; border: 1px solid #00e5ff; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-link.active { background: #00e5ff; color: #000; box-shadow: 0 0 15px #00e5ff; }
        
        #notes-sidebar { position: absolute; top: 40px; right: -350px; width: 300px; background: rgba(8, 8, 10, 0.98); border: 1px solid #444; border-radius: 14px; z-index: 10; padding: 20px; transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1); }
        #notes-sidebar.active { right: 15px; }
        textarea { width: 100%; height: 220px; background: #000; color: #fff; border: 1px solid #333; border-radius: 8px; padding: 12px; resize: none; font-family: inherit; font-size: 15px; }
        
        #link-instructions { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); font-size: 14px; color: #00e5ff; background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 20px; border: 1px solid #00e5ff; display: none; z-index: 10; }
    </style>
</head>
<body>

<div id="watermark">RJ</div>
<div id="link-instructions">SLEEP VAN BOL NAAR BOL</div>
<div id="start-overlay">
    <div class="start-box">
        <div class="glint-container">
            <h2 class="glint-text">RJ CONNECTIONS</h2>
            <div class="premium-star"></div>
        </div>
        <input type="text" id="initial-name" placeholder="Naam van de Core...">
        <button onclick="initNetwork()" style="background:#fff; color:#000; font-weight: bold; width: 100%; padding: 16px; border-radius: 12px; cursor: pointer; border: none; font-size: 16px;">START</button>
    </div>
</div>

<div id="ui-panel">
    <div class="header" onclick="this.parentElement.classList.toggle('minimized')">MENU ±</div>
    <div class="content">
        <button id="btn-link-mode" class="btn-link" onclick="toggleLinkMode()">VERBIND-MODUS: UIT</button>
        <hr style="border: 0; border-bottom: 1px solid #333; margin-bottom: 15px;">
        <input type="text" id="node-name" placeholder="Nieuwe Naam">
        
        <select id="node-color">
            <option value="#ffffff" selected>Neon Wit</option>
            <option value="#e0e0e0">Zilver Grijs</option>
            <option value="#ffd700">Goud</option>
            <option value="#ffea00">Cyber Geel</option>
            <option value="#ff8c00">Sunset Oranje</option>
            <option value="#ff4400">Vlam Oranje</option>
            <option value="#ff0000">Blood Red</option>
            <option value="#ff00ff">Magenta</option>
            <option value="#ff69b4">Hot Pink</option>
            <option value="#b200ff">Neon Paars</option>
            <option value="#7b00ff">Deep Violet</option>
            <option value="#0055ff">Deep Ocean</option>
            <option value="#00e5ff">Electric Blue</option>
            <option value="#00ffff">Neon Cyaan</option>
            <option value="#00ff88">Toxic Green</option>
            <option value="#00ff00">Matrix Groen</option>
            <option value="#bfff00">Lime Groen</option>
        </select>

        <select id="node-size">
            <option value="90">Alpha</option>
            <option value="65">Groot</option>
            <option value="45" selected>Middel</option>
            <option value="30">Klein</option>
        </select>
        <input type="text" id="node-target" placeholder="Verbinden met... (optioneel)">
        <button class="btn-add" onclick="addNode()">VOEG TOE</button>
        <button onclick="clearData()" style="color: #ff4444; border: 1px solid #400; background: none; width: 100%; padding: 10px; cursor: pointer; margin-top: 20px; font-size: 11px; opacity: 0.6;">RESET SYSTEEM</button>
    </div>
</div>

<div id="notes-sidebar">
    <h3 id="sidebar-title" style="margin-top:0; font-size:18px; color: #fff;">DATABASE</h3>
    <textarea id="notes-text"></textarea>
    <button onclick="closeSidebar()" style="margin-top:15px; width: 100%; cursor: pointer; border: 1px solid #444; background: #111; color: white; padding: 12px; border-radius: 8px;">CLOSE</button>
</div>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let width, height, nodes = [], links = [], explodeParticles = [], dataPulses = [];
    let draggingNode = null, offsetX = 0, offsetY = 0, startX = 0, startY = 0, zoom = 1.0, targetZoom = 1.0;
    let longPressTimer, initialPinchDist = null;
    
    let isLinkMode = false;
    let linkStartNode = null;
    let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;

    function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    function saveToDevice() { localStorage.setItem('rj_pro_v34_save', JSON.stringify({ nodes, links })); }
    function loadFromDevice() {
        const saved = localStorage.getItem('rj_pro_v34_save') || localStorage.getItem('rj_pro_v33_save') || localStorage.getItem('rj_pro_v32_save') || localStorage.getItem('rj_pro_v31_save');
        if(saved) {
            const d = JSON.parse(saved); 
            nodes = d.nodes.map(n => ({...n, vx: 0, vy: 0, hitFlash: 0, currentRadius: n.radius})); 
            links = d.links;
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('ui-panel').style.display = 'block';
        }
    }
    function clearData() { if(confirm("Systeem resetten?")) { localStorage.clear(); location.reload(); } }

    function toggleLinkMode() {
        isLinkMode = !isLinkMode;
        const btn = document.getElementById('btn-link-mode');
        if(isLinkMode) {
            btn.classList.add('active');
            btn.innerText = "VERBIND-MODUS: AAN";
            document.body.classList.add('link-mode');
            document.getElementById('link-instructions').style.display = 'block';
            closeSidebar();
        } else {
            btn.classList.remove('active');
            btn.innerText = "VERBIND-MODUS: UIT";
            document.body.classList.remove('link-mode');
            document.getElementById('link-instructions').style.display = 'none';
            linkStartNode = null;
        }
    }

    function hexToRgb(hex) {
        var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : {r: 255, g: 255, b: 255};
    }
    function lerpColor(color1, color2, factor) {
        const c1 = hexToRgb(color1);
        const c2 = hexToRgb(color2);
        const r = Math.round(c1.r + (c2.r - c1.r) * factor);
        const g = Math.round(c1.g + (c2.g - c1.g) * factor);
        const b = Math.round(c1.b + (c2.b - c1.b) * factor);
        return `rgb(${r}, ${g}, ${b})`;
    }

    function initNetwork() {
        let name = document.getElementById('initial-name').value.trim();
        if(!name) name = "Core";
        if(!nodes.find(n => n.id === name)) {
            nodes.push({ id: name, x: width/2, y: height/2, vx: 0, vy: 0, radius: 65, currentRadius: 65, color: "#ffffff", note: "", hitFlash: 0 });
        }
        document.getElementById('start-overlay').style.display = 'none';
        document.getElementById('ui-panel').style.display = 'block';
        saveToDevice();
    }

    function addNode() {
        const name = document.getElementById('node-name').value.trim();
        const targets = document.getElementById('node-target').value.trim();
        const color = document.getElementById('node-color').value;
        const radius = parseInt(document.getElementById('node-size').value);
        if (!name || nodes.find(n => n.id === name)) return;
        
        nodes.push({ id: name, x: (width/2 - offsetX)/zoom, y: (height/2 - offsetY)/zoom, vx: 0, vy: 0, radius, currentRadius: radius, color, note: "", hitFlash: 0 });
        if (targets) {
            targets.split(',').forEach(t => { 
                const targetNode = nodes.find(x => x.id === t.trim());
                if (targetNode) {
                    const exists = links.find(l => (l.sID === name && l.tID === targetNode.id) || (l.sID === targetNode.id && l.tID === name));
                    if(!exists) links.push({ sID: targetNode.id, tID: name });
                }
            });
        }
        document.getElementById('node-name').value = "";
        document.getElementById('node-target').value = "";
        saveToDevice();
    }

    function deleteNode(node) {
        for(let i=0; i<15; i++) explodeParticles.push({ x: node.x, y: node.y, vx: (Math.random()-0.5)*14, vy: (Math.random()-0.5)*14, life: 1.0, color: node.color });
        links = links.filter(l => l.sID !== node.id && l.tID !== node.id);
        dataPulses = dataPulses.filter(p => p.link.sID !== node.id && p.link.tID !== node.id);
        nodes = nodes.filter(n => n !== node);
        saveToDevice();
    }

    function loop() {
        zoom += (targetZoom - zoom) * 0.1;
        ctx.setTransform(1,0,0,1,0,0); 
        ctx.clearRect(0,0,width,height);
        
        ctx.translate(offsetX, offsetY); 
        ctx.scale(zoom, zoom);

        const mx = (mouseX - offsetX) / zoom;
        const my = (mouseY - offsetY) / zoom;
        const mouseGlow = ctx.createRadialGradient(mx, my, 0, mx, my, 400 / zoom);
        mouseGlow.addColorStop(0, 'rgba(42, 0, 85, 0.35)'); 
        mouseGlow.addColorStop(1, 'rgba(42, 0, 85, 0)');
        ctx.fillStyle = mouseGlow;
        ctx.beginPath();
        ctx.arc(mx, my, 400 / zoom, 0, Math.PI * 2);
        ctx.fill();

        ctx.globalCompositeOperation = 'lighter';
        explodeParticles = explodeParticles.filter(p => {
            p.x += p.vx; p.y += p.vy; p.vx *= 0.95; p.vy *= 0.95; p.life -= 0.03;
            if(p.life <= 0) return false;
            ctx.globalAlpha = p.life; ctx.strokeStyle = p.color; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, Math.PI*2); ctx.stroke();
            return true;
        });
        ctx.globalCompositeOperation = 'source-over';

        links.forEach(l => {
            const s = nodes.find(n => n.id === l.sID), t = nodes.find(n => n.id === l.tID);
            if (!s || !t) return;
            const dx = t.x-s.x, dy = t.y-s.y, dist = Math.sqrt(dx*dx+dy*dy)||1;
            const force = (dist - 280) * 0.0004; 
            if (s !== draggingNode && !isLinkMode) { s.vx += (dx/dist)*force; s.vy += (dy/dist)*force; }
            if (t !== draggingNode && !isLinkMode) { t.vx -= (dx/dist)*force; t.vy -= (dy/dist)*force; }
            
            const grad = ctx.createLinearGradient(s.x, s.y, t.x, t.y);
            grad.addColorStop(0, s.color); 
            grad.addColorStop(1, t.color);
            ctx.strokeStyle = grad; 
            ctx.globalAlpha = 0.35; 
            ctx.lineWidth = 2.5/zoom;
            ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(t.x, t.y); ctx.stroke();
        });

        // SMART PULSE LIMITER
        // We verhogen de basis-kans iets, omdat we hem daarna filteren per specifieke lijn
        if(Math.random() < 0.015 && links.length > 0) { 
            const l = links[Math.floor(Math.random() * links.length)];
            
            // Controleer hoeveel pulses er momenteel op DEZE specifieke lijn reizen
            let pulsesOnThisLink = 0;
            for(let i=0; i<dataPulses.length; i++) {
                if(dataPulses[i].link.sID === l.sID && dataPulses[i].link.tID === l.tID) {
                    pulsesOnThisLink++;
                }
            }
            
            // Standaard regel: maximaal 1 pulse.
            // Zéér zelden (5% kans) mag er een 2e pulse bij op dezelfde lijn voor een natuurlijk effect.
            if(pulsesOnThisLink === 0 || (pulsesOnThisLink === 1 && Math.random() < 0.05)) {
                dataPulses.push({ link: l, progress: 0, speed: 0.0015 + Math.random() * 0.0025 });
            }
        }
        
        ctx.globalCompositeOperation = 'lighter';
        dataPulses = dataPulses.filter(p => {
            p.progress += p.speed;
            if(p.progress >= 1) return false;
            const s = nodes.find(n => n.id === p.link.sID);
            const t = nodes.find(n => n.id === p.link.tID);
            if(!s || !t) return false;
            
            const pulseColor = lerpColor(s.color, t.color, p.progress);
            
            const rectLength = 0.08; 
            const pStart = Math.max(0, p.progress - rectLength/2);
            const pEnd = Math.min(1, p.progress + rectLength/2);
            
            const px1 = s.x + (t.x - s.x) * pStart;
            const py1 = s.y + (t.y - s.y) * pStart;
            const px2 = s.x + (t.x - s.x) * pEnd;
            const py2 = s.y + (t.y - s.y) * pEnd;
            
            ctx.save();
            ctx.lineCap = 'butt'; 
            ctx.strokeStyle = pulseColor;
            ctx.globalAlpha = 0.85; 
            ctx.lineWidth = 2.5 / zoom; 
            ctx.shadowBlur = 4; 
            ctx.shadowColor = pulseColor;
            
            ctx.beginPath();
            ctx.moveTo(px1, py1);
            ctx.lineTo(px2, py2);
            ctx.stroke();
            
            ctx.restore();
            return true;
        });
        ctx.globalCompositeOperation = 'source-over';

        if (isLinkMode && linkStartNode) {
            ctx.save();
            ctx.strokeStyle = linkStartNode.color;
            ctx.lineWidth = 2/zoom;
            ctx.setLineDash([8/zoom, 8/zoom]);
            ctx.beginPath();
            ctx.moveTo(linkStartNode.x, linkStartNode.y);
            ctx.lineTo((mouseX - offsetX)/zoom, (mouseY - offsetY)/zoom);
            ctx.stroke();
            ctx.restore();
        }

        nodes.forEach((n, i) => {
            if (n !== draggingNode && !isLinkMode) {
                n.vx *= 0.88; n.vy *= 0.88;
                n.x += n.vx; n.y += n.vy;
                nodes.slice(i+1).forEach(n2 => {
                    const dx = n2.x-n.x, dy = n2.y-n.y, dist = Math.sqrt(dx*dx+dy*dy)||1;
                    const minDist = n.currentRadius + n2.currentRadius + 50;
                    if (dist < minDist) { 
                        const push = (minDist - dist) * 0.012; 
                        if(push > 0.4) { n.hitFlash = 1.0; n2.hitFlash = 1.0; }
                        n.vx -= (dx/dist)*push; n.vy -= (dy/dist)*push; 
                        n2.vx += (dx/dist)*push; n2.vy += (dy/dist)*push; 
                    }
                });
            }
            n.hitFlash *= 0.85;

            ctx.save();
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.arc(n.x, n.y, n.currentRadius, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            const softLayers = [
                { blur: 40 + (n.hitFlash * 20), width: 8, alpha: 0.2 },
                { blur: 20 + (n.hitFlash * 15), width: 4, alpha: 0.4 },
                { blur: 10 + (n.hitFlash * 10), width: 1.5, alpha: 0.6 }
            ];

            softLayers.forEach(layer => {
                ctx.save();
                ctx.shadowBlur = layer.blur;
                ctx.shadowColor = n.color;
                ctx.strokeStyle = (n.hitFlash > 0.3) ? '#ffffff' : n.color;
                ctx.lineWidth = layer.width / zoom;
                ctx.globalAlpha = layer.alpha;
                ctx.beginPath();
                ctx.arc(n.x, n.y, n.currentRadius, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            });

            ctx.save();
            ctx.fillStyle = '#ffffff';
            ctx.globalAlpha = 1.0;
            ctx.font = `bold ${14/zoom}px Arial`;
            ctx.textAlign = "center";
            ctx.fillText(n.id, n.x, n.y + n.currentRadius + 30/zoom);
            ctx.restore();
        });
        requestAnimationFrame(loop);
    }

    function handleStart(e) {
        const pos = e.touches ? e.touches[0] : e;
        mouseX = pos.clientX; mouseY = pos.clientY;
        if (e.touches && e.touches.length === 2) { initialPinchDist = Math.sqrt((e.touches[0].clientX - e.touches[1].clientX)**2 + (e.touches[0].clientY - e.touches[1].clientY)**2); return; }
        const mx = (pos.clientX - offsetX)/zoom, my = (pos.clientY - offsetY)/zoom;
        let foundNode = null;
        nodes.forEach(n => { if (Math.sqrt((mx-n.x)**2 + (my-n.y)**2) < n.radius) foundNode = n; });

        if (isLinkMode) {
            if (foundNode) linkStartNode = foundNode;
        } else {
            if (foundNode) {
                if (e.button === 2) deleteNode(foundNode);
                else { draggingNode = foundNode; openSidebar(foundNode); longPressTimer = setTimeout(() => { if(confirm("Verwijderen?")) deleteNode(foundNode); }, 1000); }
            } else {
                startX = pos.clientX - offsetX; startY = pos.clientY - offsetY;
            }
        }
    }
    
    function handleMove(e) {
        clearTimeout(longPressTimer);
        const pos = e.touches ? e.touches[0] : e;
        mouseX = pos.clientX; mouseY = pos.clientY;
        if (isLinkMode && linkStartNode) {} 
        else if (draggingNode) { draggingNode.x = (pos.clientX - offsetX)/zoom; draggingNode.y = (pos.clientY - offsetY)/zoom; draggingNode.vx = 0; draggingNode.vy = 0; saveToDevice(); } 
        else if (startX !== 0) { offsetX = pos.clientX - startX; offsetY = pos.clientY - startY; }
    }
    
    function handleEnd(e) { 
        clearTimeout(longPressTimer); 
        if (isLinkMode && linkStartNode) {
            const mx = (mouseX - offsetX)/zoom, my = (mouseY - offsetY)/zoom;
            let targetNode = null;
            nodes.forEach(n => { if (Math.sqrt((mx-n.x)**2 + (my-n.y)**2) < n.radius) targetNode = n; });
            if (targetNode && targetNode !== linkStartNode) {
                const exists = links.find(l => (l.sID === linkStartNode.id && l.tID === targetNode.id) || (l.sID === targetNode.id && l.tID === linkStartNode.id));
                if (!exists) { links.push({ sID: linkStartNode.id, tID: targetNode.id }); saveToDevice(); }
            }
            linkStartNode = null;
        }
        draggingNode = null; startX = 0; 
    }

    canvas.addEventListener('mousedown', handleStart);
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleEnd);
    canvas.addEventListener('touchstart', handleStart);
    window.addEventListener('touchmove', handleMove, {passive: false});
    window.addEventListener('touchend', handleEnd);
    window.addEventListener('wheel', e => { targetZoom = Math.min(Math.max(0.1, targetZoom + e.deltaY * -0.0015), 4); }, {passive: false});
    window.oncontextmenu = (e) => e.preventDefault();

    function openSidebar(n) { if(isLinkMode) return; selectedNodeId = n.id; document.getElementById('notes-sidebar').classList.add('active'); document.getElementById('sidebar-title').innerText = n.id; document.getElementById('notes-text').value = n.note || ""; }
    function closeSidebar() { document.getElementById('notes-sidebar').classList.remove('active'); selectedNodeId = null; }
    document.getElementById('notes-text').oninput = function() { if(selectedNodeId) { nodes.find(n => n.id === selectedNodeId).note = this.value; saveToDevice(); } };

    loadFromDevice();
    loop();
</script>
</body>
</html>
